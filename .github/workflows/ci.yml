name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src
      - name: Test with coverage
        run: uv run pytest -q
      - name: Execute notebooks
        run: uv run jupyter nbconvert --execute --to notebook --output-dir /tmp/eventmm-notebooks --ExecutePreprocessor.timeout=180 notebooks/*.ipynb
      - name: Build package
        run: uv build
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
